name: material_ledger
description: "Construction Material Ledger — The Architectural Ledger"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Typography
  google_fonts:

  # UI Utilities
  gap:
  flutter_svg: ^2.0.17

  # Utilities
  intl:

  # Persistence
  shared_preferences:

  # UUID generation
  uuid: ^4.5.1
  printing: ^5.15.0
  pdf: ^3.13.0
  crypto: ^3.0.7
  package_info_plus: ^10.1.0
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Icon generation (build-time only)
  flutter_launcher_icons: ^0.14.4
  image: ^4.3.0

# App launcher icon: the Yorks "Y" monogram on a brand-blue tile (the full
# emblem's ring text is illegible at icon sizes). Sources are generated from the
# emblem by tool/gen_icons.dart, then this turns them into all platform sizes.
flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  # Must equal the foreground's full-bleed blue (sampled from the emblem by
  # gen_icons.dart) so the adaptive inset shows no two-tone border.
  adaptive_icon_background: "#0038B8"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/fonts/
